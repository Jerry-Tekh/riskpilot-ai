venue:
  name: BINANCE
  account_type: MARGIN
  oms_type: NETTING
  starting_balances:
    - amount: 100000
      currency: USDT

strategy:
  module: strategy
  class: AdaptiveRegimeStrategy
  config_class: AdaptiveRegimeConfig
  config:
    order_id_tag: "001"
    trade_size: "0.01"
    fast_period: 12
    slow_period: 34
    rsi_period: 14
    atr_period: 14
    trend_threshold: 1.0
    range_threshold: 0.4
    rsi_oversold: 32
    rsi_overbought: 68
    sl_atr_mult: 1.5
    tp_atr_mult: 3.0

instrument:
  id: BTCUSDT.BINANCE
  kind: perpetual
  raw_symbol: BTCUSDT
  base_currency: BTC
  quote_currency: USDT
  settlement_currency: USDT
  price_precision: 2
  size_precision: 3
  price_increment: "0.01"
  size_increment: "0.001"
  lot_size: "0.001"
  maker_fee: "0.0002"
  taker_fee: "0.0005"
  bar_type: BTCUSDT.BINANCE-1-HOUR-LAST-EXTERNAL
